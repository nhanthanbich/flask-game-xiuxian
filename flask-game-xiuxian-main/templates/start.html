<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tu Tiên Ký - Khai Môn Bái Sư</title>

  <!-- Mystical Font Arsenal -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=Cinzel:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Heavenly palettes */
      --void-black:        #030305;
      --obsidian:          #08080f;
      --dark-granite:      #0e0e18;
      --shadow-stone:      #14141f;

      /* Spiritual essence */
      --jade-essence:      #4fd1a5;
      --jade-glow:         #2dd4a0;
      --celestial-gold:    #ffc847;
      --immortal-gold:     #e6b422;
      --blood-crystal:     #dc2626;
      --spirit-silver:     #9ca3af;
      --moonlight-silver: #e5e7eb;
      --water-qi:          #60a5fa;
      --earth-qi:          #a78bfa;

      /* Fonts */
      --font-immortal:    'Noto Serif SC', 'Cinzel', serif;
      --font-script:      'Ma Shan Zheng', 'ZCOOL XiaoWei', cursive;
      --font-elder:        'Noto Serif SC', serif;
      --font-spirit:      'Share Tech Mono', monospace;

      /* Gradients */
      --gradient-heavenly: linear-gradient(135deg,
        #030305 0%,
        #0a0815 25%,
        #100820 50%,
        #0a0815 75%,
        #030305 100%
      );
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      background: var(--void-black);
      font-family: var(--font-immortal);
      color: var(--moonlight-silver);
      line-height: 1.6;
    }

    /* ═══════════════════════════════════════════════════════════════
       ANIMATED BACKGROUND - Heavenly Realm
       ═══════════════════════════════════════════════════════════════ */
    .heavenly-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .heavenly-bg::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background:
        radial-gradient(circle at 30% 20%, rgba(79, 209, 165, 0.08) 0%, transparent 30%),
        radial-gradient(circle at 70% 80%, rgba(255, 200, 71, 0.06) 0%, transparent 30%),
        radial-gradient(circle at 50% 50%, rgba(96, 165, 250, 0.05) 0%, transparent 40%);
      animation: realmRotate 60s linear infinite;
    }

    @keyframes realmRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Floating Qi Particles */
    .qi-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .qi {
      position: absolute;
      border-radius: 50%;
      animation: qiAscend linear infinite;
      opacity: 0;
    }

    .qi.jade {
      width: 3px;
      height: 3px;
      background: radial-gradient(circle, var(--jade-essence) 0%, transparent 70%);
      box-shadow: 0 0 10px var(--jade-essence);
    }

    .qi.gold {
      width: 4px;
      height: 4px;
      background: radial-gradient(circle, var(--celestial-gold) 0%, transparent 70%);
      box-shadow: 0 0 12px var(--celestial-gold);
    }

    .qi.silver {
      width: 2px;
      height: 2px;
      background: radial-gradient(circle, var(--moonlight-silver) 0%, transparent 70%);
      box-shadow: 0 0 8px var(--moonlight-silver);
    }

    @keyframes qiAscend {
      0% {
        transform: translateY(100vh) translateX(0) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
        transform: translateY(90vh) translateX(10px) scale(1);
      }
      90% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(-10vh) translateX(-20px) scale(0);
        opacity: 0;
      }
    }

    /* ═══════════════════════════════════════════════════════════════
       MAIN CONTAINER
       ═══════════════════════════════════════════════════════════════ */
    .realm-container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ═══════════════════════════════════════════════════════════════
       TITLE SECTION
       ═══════════════════════════════════════════════════════════════ */
    .title-section {
      text-align: center;
      margin-bottom: 3rem;
      animation: titleFadeIn 1.5s ease-out;
    }

    @keyframes titleFadeIn {
      from {
        opacity: 0;
        transform: translateY(-50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tai-chi-container {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 2rem;
    }

    .tai-chi {
      font-size: 8rem;
      display: block;
      animation: yinYangRotate 20s linear infinite;
      filter: drop-shadow(0 0 30px rgba(79, 209, 165, 0.8));
      position: relative;
      z-index: 2;
    }

    @keyframes yinYangRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .tai-chi-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(79, 209, 165, 0.2) 0%,
        rgba(255, 200, 71, 0.15) 40%,
        transparent 70%
      );
      animation: glowPulse 3s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes glowPulse {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.6;
      }
      50% {
        transform: translate(-50%, -50%) scale(1.3);
        opacity: 1;
      }
    }

    .game-title {
      font-family: var(--font-script);
      font-size: clamp(4rem, 15vw, 7rem);
      font-weight: 700;
      background: linear-gradient(135deg,
        var(--jade-essence) 0%,
        var(--celestial-gold) 30%,
        var(--moonlight-silver) 60%,
        var(--celestial-gold) 80%,
        var(--jade-essence) 100%
      );
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
      animation: titleGradient 8s ease infinite;
      text-shadow: none;
      filter: drop-shadow(0 0 40px rgba(255, 200, 71, 0.3));
    }

    @keyframes titleGradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .game-subtitle {
      font-family: var(--font-immortal);
      font-size: clamp(0.8rem, 3vw, 1.2rem);
      color: var(--spirit-silver);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 1rem;
    }

    .game-tagline {
      font-family: var(--font-elder);
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: var(--jade-essence);
      font-style: italic;
      opacity: 0.8;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.8;
    }

    /* ═══════════════════════════════════════════════════════════════
       DIVIDER
       ═══════════════════════════════════════════════════════════════ */
    .divider {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin: 3rem 0;
      width: 100%;
      max-width: 800px;
      animation: dividerFadeIn 2s ease-out 0.5s backwards;
    }

    @keyframes dividerFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(79, 209, 165, 0.5) 30%,
        rgba(255, 200, 71, 0.8) 50%,
        rgba(79, 209, 165, 0.5) 70%,
        transparent 100%
      );
    }

    .divider-ornament {
      font-size: 2rem;
      color: var(--jade-essence);
      animation: ornamentPulse 2s ease-in-out infinite;
    }

    @keyframes ornamentPulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.7;
      }
      50% {
        transform: scale(1.1);
        opacity: 1;
      }
    }

    /* ═══════════════════════════════════════════════════════════════
       SLOTS SECTION
       ═══════════════════════════════════════════════════════════════ */
    .slots-section {
      width: 100%;
      max-width: 1400px;
      animation: slotsFadeIn 1s ease-out 0.8s backwards;
    }

    @keyframes slotsFadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .slots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      padding: 1rem;
    }

    /* ═══════════════════════════════════════════════════════════════
       SLOT CARDS
       ═══════════════════════════════════════════════════════════════ */
    .slot-card {
      position: relative;
      background: linear-gradient(135deg,
        rgba(14, 14, 24, 0.95) 0%,
        rgba(20, 20, 32, 0.9) 100%
      );
      border: 2px solid transparent;
      border-image: linear-gradient(135deg,
        rgba(79, 209, 165, 0.4) 0%,
        rgba(255, 200, 71, 0.3) 100%
      ) 1;
      padding: 2rem;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      animation: slotFadeIn 0.6s ease-out backwards;
    }

    .slot-card:nth-child(1) { animation-delay: 1s; }
    .slot-card:nth-child(2) { animation-delay: 1.2s; }
    .slot-card:nth-child(3) { animation-delay: 1.4s; }
    .slot-card:nth-child(4) { animation-delay: 1.6s; }

    @keyframes slotFadeIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .slot-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--jade-essence) 50%,
        transparent 100%
      );
      animation: borderFlow 3s ease-in-out infinite;
    }

    @keyframes borderFlow {
      0%, 100% { opacity: 0.5; transform: scaleX(0.8); }
      50% { opacity: 1; transform: scaleX(1); }
    }

    .slot-card::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(79, 209, 165, 0.1) 0%, transparent 50%);
      animation: cardGlow 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes cardGlow {
      0%, 100% { transform: rotate(0deg); opacity: 0.3; }
      50% { transform: rotate(180deg); opacity: 0.6; }
    }

    .slot-card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow:
        0 20px 60px rgba(79, 209, 165, 0.3),
        0 0 80px rgba(255, 200, 71, 0.15),
        inset 0 0 20px rgba(79, 209, 165, 0.1);
      border-image: linear-gradient(135deg,
        var(--jade-essence) 0%,
        var(--celestial-gold) 100%
      ) 1;
    }

    .slot-number {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      font-family: var(--font-immortal);
      font-size: 4rem;
      font-weight: 900;
      background: linear-gradient(135deg,
        rgba(79, 209, 165, 0.15) 0%,
        rgba(255, 200, 71, 0.1) 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      opacity: 0.8;
    }

    .slot-icon {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      font-size: 2.5rem;
      opacity: 0.6;
    }

    .slot-body {
      position: relative;
      z-index: 2;
    }

    .slot-header {
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(79, 209, 165, 0.2);
    }

    .slot-title {
      font-family: var(--font-script);
      font-size: 1.5rem;
      color: var(--celestial-gold);
      margin: 0 0 0.5rem 0;
      letter-spacing: 0.1em;
      text-shadow: 0 0 20px rgba(255, 200, 71, 0.5);
    }

    .slot-status {
      font-size: 0.9rem;
      color: var(--spirit-silver);
      opacity: 0.8;
    }

    .slot-status.active {
      color: var(--jade-essence);
      font-weight: 600;
      text-shadow: 0 0 10px rgba(79, 209, 165, 0.3);
    }

    .slot-meta {
      font-size: 0.85rem;
      color: var(--spirit-silver);
      opacity: 0.7;
      font-family: var(--font-spirit);
      margin-bottom: 1.5rem;
      padding: 0.75rem;
      background: rgba(20, 20, 30, 0.4);
      border-left: 2px solid var(--jade-essence);
    }

    .slot-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .slot-actions form {
      flex: 1;
      min-width: 120px;
    }

    .slot-actions .btn {
      width: 100%;
    }

    /* ═══════════════════════════════════════════════════════════════
       BUTTONS
       ═══════════════════════════════════════════════════════════════ */
    .btn {
      background: linear-gradient(135deg,
        rgba(18, 18, 28, 0.9) 0%,
        rgba(25, 25, 40, 0.9) 100%
      );
      border: 1.5px solid rgba(79, 209, 165, 0.4);
      color: var(--moonlight-silver);
      font-family: var(--font-immortal);
      font-size: 1rem;
      padding: 0.75rem 1.5rem;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.05em;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(79, 209, 165, 0.3) 50%,
        transparent 100%
      );
      transition: left 0.5s ease;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      border-color: var(--jade-essence);
      color: var(--celestial-gold);
      background: linear-gradient(135deg,
        rgba(25, 25, 40, 0.95) 0%,
        rgba(30, 30, 45, 0.95) 100%
      );
      box-shadow:
        0 0 20px rgba(79, 209, 165, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
      border-color: rgba(79, 209, 165, 0.2);
    }

    .btn-load {
      border-color: var(--jade-essence);
    }

    .btn-load:hover {
      border-color: var(--celestial-gold);
    }

    .btn-delete {
      border-color: rgba(220, 38, 38, 0.4);
      background: linear-gradient(135deg,
        rgba(40, 15, 15, 0.8) 0%,
        rgba(60, 20, 20, 0.8) 100%
      );
      color: var(--blood-crystal);
    }

    .btn-delete:hover {
      border-color: var(--blood-crystal);
      background: linear-gradient(135deg,
        rgba(50, 20, 20, 0.95) 0%,
        rgba(70, 25, 25, 0.95) 100%
      );
      box-shadow: 0 0 20px rgba(220, 38, 38, 0.4);
      color: #ef4444;
    }

    .btn-new {
      border-color: var(--celestial-gold);
      border-width: 2px;
      background: linear-gradient(135deg,
        rgba(35, 25, 15, 0.9) 0%,
        rgba(45, 35, 20, 0.9) 100%
      );
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .btn-new:hover {
      background: linear-gradient(135deg,
        rgba(45, 35, 20, 0.95) 0%,
        rgba(55, 45, 30, 0.95) 100%
      );
      border-color: var(--celestial-gold);
      box-shadow:
        0 0 40px rgba(255, 200, 71, 0.5),
        0 0 80px rgba(255, 200, 71, 0.2);
    }

    .btn-exit {
      border-color: rgba(220, 38, 38, 0.4);
      background: linear-gradient(135deg,
        rgba(30, 15, 15, 0.7) 0%,
        rgba(40, 20, 20, 0.7) 100%
      );
      color: var(--blood-crystal);
      font-size: 0.9rem;
      padding: 0.6rem 1.2rem;
    }

    .btn-exit:hover {
      border-color: var(--blood-crystal);
      background: linear-gradient(135deg,
        rgba(45, 20, 20, 0.9) 0%,
        rgba(55, 25, 25, 0.9) 100%
      );
      box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
    }

    /* Exit Section */
    .exit-section {
      margin-top: 3rem;
      text-align: center;
      padding-top: 2rem;
      border-top: 1px solid rgba(79, 209, 165, 0.15);
    }

    /* ═══════════════════════════════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════════════════════════════ */
    .realm-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem;
      background: rgba(3, 3, 5, 0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(79, 209, 165, 0.15);
      z-index: 100;
      animation: footerFadeIn 1s ease-out 1.8s backwards;
    }

    @keyframes footerFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .footer-content {
      text-align: center;
      color: var(--spirit-silver);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      opacity: 0.6;
    }

    /* ═══════════════════════════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════════════════════════ */
    @media (max-width: 767px) {
      .game-title {
        font-size: 3.5rem;
        letter-spacing: 0.1em;
      }

      .tai-chi {
        font-size: 6rem;
      }

      .tai-chi-container {
        width: 120px;
        height: 120px;
      }

      .tai-chi-glow {
        width: 140px;
        height: 140px;
      }

      .slots-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .slot-number {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>
  <!-- Heavenly Background -->
  <div class="heavenly-bg"></div>

  <!-- Qi Particles -->
  <div class="qi-particles">
    <div class="qi jade" style="left: 10%; animation-duration: 18s; animation-delay: 0s;"></div>
    <div class="qi gold" style="left: 20%; animation-duration: 22s; animation-delay: 2s;"></div>
    <div class="qi silver" style="left: 30%; animation-duration: 16s; animation-delay: 4s;"></div>
    <div class="qi jade" style="left: 40%; animation-duration: 20s; animation-delay: 1s;"></div>
    <div class="qi gold" style="left: 50%; animation-duration: 24s; animation-delay: 3s;"></div>
    <div class="qi silver" style="left: 60%; animation-duration: 19s; animation-delay: 5s;"></div>
    <div class="qi jade" style="left: 70%; animation-duration: 21s; animation-delay: 0.5s;"></div>
    <div class="qi gold" style="left: 80%; animation-duration: 17s; animation-delay: 2.5s;"></div>
    <div class="qi silver" style="left: 90%; animation-duration: 23s; animation-delay: 4.5s;"></div>
    <div class="qi jade" style="left: 15%; animation-duration: 20s; animation-delay: 1.5s;"></div>
    <div class="qi gold" style="left: 35%; animation-duration: 18s; animation-delay: 3.5s;"></div>
    <div class="qi silver" style="left: 55%; animation-duration: 22s; animation-delay: 0.2s;"></div>
    <div class="qi jade" style="left: 75%; animation-duration: 21s; animation-delay: 2.2s;"></div>
    <div class="qi gold" style="left: 85%; animation-duration: 19s; animation-delay: 4.2s;"></div>
    <div class="qi silver" style="left: 95%; animation-duration: 17s; animation-delay: 1.2s;"></div>
  </div>

  <!-- Main Content -->
  <div class="realm-container">
    <div class="title-section">
      <div class="tai-chi-container">
        <div class="tai-chi-glow"></div>
        <span class="tai-chi">☯</span>
      </div>
      <h1 class="game-title">修仙记</h1>
      <p class="game-subtitle">Tu Tiên Ký - Immortal Path</p>
      <p class="game-tagline">
        "Thiên địa chi gian, vạn vật giai linh.
        Ngộ đạo tu thân, ngưỡng vọng trường sinh."
      </p>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-ornament">❖</span>
      <div class="divider-line"></div>
    </div>

    <div class="slots-section">
      <div class="slots-grid">
        {{ content|safe }}
      </div>

      <!-- Exit Button at Bottom -->
      <div class="exit-section">
        <button class="btn btn-exit" onclick="confirmExit()">
          <span class="btn-icon">✕</span>
          Thoát Game
        </button>
      </div>

      <script>
      function confirmExit() {
        if (confirm('Bạn có chắc muốn thoát game?')) {
          window.close();
          // Fallback if window.close doesn't work
          setTimeout(function() {
            alert('Vui long dong tab de thoat game.');
          }, 100);
        }
      }
      </script>
    </div>
  </div>
